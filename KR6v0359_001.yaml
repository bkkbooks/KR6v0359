body:
  text: 西藏達瓦桑杜格西喇嘛英文譯傳從學弟子美國伊文思溫慈博士纂集震旦觀化廬學藏密菩薩優婆塞張妙定蓮菩提金剛正重譯漢文第一章頗哇心要轉識自在恆修法皈敬法皈敬偈曰具足一切圓滿聖上師從今直至菩提我皈依無量無邊所有諸衆生專心普賢行願入正覺金剛瑜祇尼母及上師本尊道場觀次以內相續作如下之觀想先令執此幻有身為實之凡心境化散為空已從無垢染之真心識性成就如金剛瑜祇尼之空明光耀體紅色一頭兩臂右手高舉過頭執持金剛偃月短灣刀而揚舞左手灣臂平胸執持滿貯鮮血之人腦蓋骨碗左脅灣夾持白色長杖若斜身倚彼之勢而立身帶五種密義莊嚴詳見明行道六成就法及各種莊嚴具立於蓮座日輪盤上右足踡左足伸而立足下踐踏人尸一具作美觀姿勢體明而內空周身為智慧火焰環繞次想高處空中蓮座月輪盤墊上坐有根本上師最上佑者即金剛大持藏名多傑羌佛尊身藍色一頭二臂著無上妙寶莊嚴報身佛裝兩手右外左內交叉胸際執杵與鈴次想緊接自之頭上逆序而上各於虹圓光中金剛跏趺坐者有諸歷代承傳此無上妙法之諸上師衆祈禱偈次即誦如下之祈禱偈曰無退佛土聖上師五佛總尊金剛持我今竭誠致敬禮成就頗哇求加持令入光榮淨勝剎得法性身出有壞聖樂剎中諦洛巴那若巴及嘛爾巴尊聖父子我敬禮成就頗哇求加持令入光榮淨勝剎得法性身出有壞證實相者自放光米勒熱巴至恩德納我子者誠敬禮成就頗哇求加持令入光榮淨勝剎得法性身出有壞妙明心者自放光釋迦師利最勝者納我子者誠敬禮成就頗哇求加持令入光榮淨勝剎得法性身出有壞於我頂上蓮月坐承傳諸師至恩德納我子者誠敬禮成就頗哇求加持令入光榮淨勝剎得法性身出有壞以我堅誠信禮敬感我頂上諸上師一一融為大淨光諸寶上師合一體成一根本總上師是即金剛大持尊發願偈次再堅誠向根本上師祈願如下皈敬一切勝者總集體一切怙者總集真實體所有密趣全部總持尊我於現未唯一總皈處尊賜恩德永遠莫能酬唯尊能知無比大恩惠尊能知我極至心祈求願速圓成無上頗哇道尊居無色最勝淨法界願賜加持令證無壞性本尊瑜伽如上偈反復虔誦不計遍數已以內相續發廣願默想云我當導引等同虛空無邊有情共成無上菩提之道為達此目的故我當修行於頗哇之最極要妙隨作觀想如下謂觀想我之根本上師為一切三寶之總集真實體現前安住所有等同虛空無邊有情連我在內敬仰皈依直至證得圓滿覺地之時所以如此者為欲導引所有四生之類一一有情皆同證無上菩提故如是觀想已即收攝本尊福田入自身中金剛扎格尼及上師瑜伽次復觀想自身成空住於無想念境頃之從彼雖寂靜而光照之無染智性境自然放光剎那間成就金剛扎格尼母體紅色具足種種莊嚴體之中央直貫中脈如箭桿粗外白內紅具足四德謂赤色光明直形及內空也下閉上張下口抵臍下四指處上口於頂門梵穴如天窗之仰張此中脈貫通心處心中四葉蓮花之中臺上觀一明點即風息心識相應合成體白色微紅欲飛躍上升狀如是觀想了了分明次即於此自性成就扎格尼母之頭頂際觀想有金剛大持佛體之根本上師端坐其上自彼之頭頂以上挨次逆序而上坐有歷代承傳諸上師其最高頂端所坐者仍為根本上師金剛大持佛尊於是猛利誠敬懇切求哀要令身毛皆豎悲淚盈頰至極虔懇誦上祈禱偈誦已即觀想所有歷代承傳諸上師一一鎔入自之頂上根本上師金剛大持一體之內合為一身是即一切怙主之總集體繼乃至誠懇切誦上發願偈隨力多返誦之誦已即觀根本上師心中真言吽字是即一切勝者諸佛微妙本心金剛種性字作藍色放射五智之光明如是觀想了了分明隨即高呼醯聲同時想自心中明點騰躍而起飛升直入根本上師心中吽字之內即契合為一體無二無別住此少頃乃呼嘎聲使明點降復原自心處如是猛利不斷反復修此瑜伽者上等成就之行人於二十一呼醯聲後即得應驗中等者一座之修約一小時又半下等者全日之修其應驗者頂門梵穴處皮肉隆腫血液黃水溢出且可以草梗洞入梵穴得此應驗後即可止修改觀根本上師金剛大持轉成無量壽佛阿彌陀佛之報身佛手持寶瓶降澍甘露充滿我身口意一切靈力脈輪無微不至而我即獲無量壽命隨力多誦無量壽佛之心陀羅尼誦畢即觀無量壽佛轉成清淨光明收入自身注無量壽佛心陀羅尼曰嗡阿嘛囉呢濟汪隄業莎哈阿嘛囉呢濟汪隄業即無量壽命願賜加持意又此頭上上師本尊觀為迦居爾派密特傳其法頂底兩座皆觀金剛大持緊挨行人頂際梵穴開處即觀金剛大持佛尊於獅王寶座作金剛跏趺佛威儀坐本尊頂上同樣坐者為行人所由受法之世出世間承傳無上妙要諸上師依序回溯而上以諦洛巴聖者為第一代於世傳承之初祖上師而其頂上則為最高無上之金剛大持根本上師尊佛此尊根本上師為蔭覆加持行人之各上師及各代祖上師者而緊接自頂亦有金剛大持根本上師尊佛則為蔭覆加持現時修行之世間身者也又此中金剛扎格尼之觀法與上文之金剛瑜祇尼同行人一起於座即當等同聖者而自觀如有譬喻云如鳥行空不著空痕當應善巧其心相續於此不可思議法界真實性境亦必不斷堅誠誓願證得無上菩提惟於頗哇轉識修行者又必兼修無量壽佛之要法注恆修於此頗哇轉識要妙道者同時有漸促短世壽之虞因力能速使色身之遷化成熟故以是又當兼修對治之無量壽佛法以延持其壽命已上為頗哇心要中可許筆之於書而傳者意即尚有微細要妙不許筆傳必曰上師口授之處也原書短跋云此短跋者為著本書之成道者自述其因緣殊異有如是也方余退隱薰修期間曾於淨光境數得面覲米勒熱巴至尊祖聖上師且於無上勝信樂境中從聖者聆受許多微妙祕密教授其後見一顏貌紅而帶黃上唇生鬍之老母現前謂余曰師弟我欲請求關於頗哇之要妙道老母言已瞬化虹光而沒其後又有來自北方教導衆生之阿哇達囉梵言阿瓦達囉藏言吐爾谷即蒙古所言之呼圖克圖謂世世轉生人間宏化之聖者也向余請求於是瘋行者釋迦師利本其淨心所現著此於篇普願禎祥注此中釋迦師利不敢遽定其即為祈禱偈中所列同名之祖上師抑為後代承傳上師已有成就者之一偶同其是且或即其轉生身均不可定至其北方來者即此所謂瘋行者之大弟子則本章跋語已言明瘋行者之名稱則藏地成就者喇嘛每有為人如化稱之者又此老母似即扎格尼所幻現者也蓮菩謹按二認為此釋迦師利即偈語中之釋迦師利祖上師無疑何以故因固偈中於此祖上師名下即未更列而但言不諸但師恩德云云且此法原本又必成於或傳出此北方之大弟子亦已成祖上師也第二章頗哇心要轉識自在度亡法頗哇心要轉識自在之要妙道中有度亡之法如下初級成就瑜伽士所作之度亡法行者自於道行中如為尚未達於超離幻相之境地者則應如有作法謹按藏密大分有作修瑜伽無上瑜伽三者之分此中所分三種行者之三種作法各各淺深大異即依此而為差別然如藏中凡為度亡者必為高德喇嘛讀者萬勿膽大妄為自他兼害是為至要鄙譯另有一種亦為達瓦喇嘛譯傳之中陰救度密法彼書有特垂方便先誦皈依發心等偈多遍已將死體觀空遣除幻色之見令極淨盡由空性中出現了了分明而亦本空之金剛札格尼其體中有外白內紅之中脈大若箭桿下端閉而上端開於梵穴如天窗等觀其脈中當心之部位處有活躍之細畫紅色吽字此即死者之業識體其頂際梵門上有蓮月輪盤座座上五色虹圓光中根本上師本尊至聖救度主為所有一切雲海皈處之總集體是為至高無上金剛大持佛尊藍色一頭兩臂左鈴右杵交叉胸際無上天衣妙寶種種莊嚴金剛跏趺而坐本尊心中月輪盤上真言吽字藍色是為一切勝者如來之五智本體於是至極虔誠舉誦祈願文等此即前章所述務令與諸上師本尊真實相應次即一面力呼醯聲一面觀想本尊心中藍吽字下端母音符向下長伸如鈎將彼死者心中紅吽字上端嘛字小圈鈎牢向上提升再一呼即提至喉部第三呼即提至梵門第四呼即已提入本尊心月輪中而融入本尊之藍吽字成為一體至是即極力大聲呼曰拍如是彼頂上由觀想而成之本尊淨幻化體者立即轉入於色究竟天法性土中與智身金剛大持之真實性體合而為一無二無別矣住此定若干時後即儘力多返舉誦種種祈求加被等等偈文以作結謹按此種種度亡之偈誦文等中陰救度密法之書尾附有由手鈔祕本所譯傳之全文中級成就瑜伽士所作之度亡法瑜伽行人如為有所證悟於心色諸法無異無別者則可如下法以度亡者助其轉識自在先修作於皈依發心等令心極盡澄定絶無妄念次儘力多返向諸已得成就之寶上師衆此即一切勝者之聖合體亦即一切心色諸法無異無別真實表顯體處虔誠祈禱求願已於是命亡者之業識合入自之識中無二無別後繼用呼拍之法使自之識轉入金剛大持本尊之清淨智性住入於此法界體性境中久之後乃舉誦祈求偈頌等以作結行如此作法者中心務令絶無妄念是極重要高級成就瑜伽士所作之度亡法瑜伽行人如自之成就已高確已有所證悟能自在入於法界實際真空體性者則其心境即已自能超越一切能度所度之差別相此謂於根本真心淨光境中即彼無上大安樂聖淨境中曾已善巧安住則得了知其中無相唯一淨光明空所有能見所見乃至能怙所怙諸差別相盡皆消泯又能於此境中了知生死涅槃兩端之幻法直同書空之畫畫而無畫幻有非實一切諸法本無生滅即被幻執差別於他者之所謂我亦本無有但得如是證悟之者於彼即更無有何者所謂轉識之法是以得如此成就之瑜伽行人如行度亡即亦更無他作唯以如彼所已證悟如是之真實義諦輕舉向彼死者耳中陡一提醒即能剎那為死者閉息六道生門而立使之頓入無生法忍之不退地原書此章跋尾云此度亡轉識自在法為已證得持明成就釋迦師利之所作彼因已超越如此中所云轉識之需要惟於薰修餘暇緣其大弟子兆阿哇達囉意見前章跋語小注瑜伽行人之勸請因作此篇回向曰願以作此勝功德回向法界諸衆生其量無盡等虛空皆得證入無生忍第三章本尊上師聖相莊嚴觀今將本尊上師之聖相莊嚴在於行者頂上成直線依序叠坐者分為述明如下如上文第一章所述根本上師金剛大持之頂上謹按原書此處不甚完足若依第一章所述之最上頂際及緊挨行人頂各想一金剛大持尊則其間須加入一節行人所從受學之各上師代代回溯以至於傑尊米勒熱巴乃至再如此下所描述者但蓮菩提竊以為此法本極似最早由聖米勒熱巴所直接傳與釋迦師利祖上師由此祖上師傳與如上所述之北山某祖上師其自彼以下之歷代承傳上師則須由行人各自直承之上師面授之即不可且勢亦不能盡述於此者歟坐於蓮月寶座之上者為傑尊意即尊長上師聖者米勒熱巴淺藍色右手曲肱抵腮作金剛支頤印勢原書但言金剛印於注欄中繪一圖形為伸直右手之小指而名指中指屈入手心以大指屈壓於其中指之甲而食指雖伸而作鈎勢故非如通常之金剛降伏印也左手平臍際執持人腦蓋骨碗內滿貯甘露兩足跏趺坐此尊之頂上為嘛爾巴聖者棕紅色身格魁偉著喇嘛裝束兩小腿下叉作如意之蹲踞坐式兩手如彌陀托甘露鉢式但所托者為滿貯甘露之人腦蓋骨碗兩目仰睛以觀空此尊之頂上為那若巴聖者亦淺藍色結髮於頂如印度瑜伽行者戴五骷髏之寶冠具足六種骨類之莊嚴腰繫印度式之裙右手執吹羚羊之角左手降伏印食指小指伸中指名指屈入手心大指屈壓中指甲兩足如鐵匠扯爐之坐式而坐此尊之頂上為無上光榮聖者上師諦洛巴棕色怒而微笑髮結於頂諸寶莊嚴之戴蓮華五瓣冠身上斜套禪定之帶圈腰繫虎皮裙如意而坐右手高舉執一金魚魚表六道衆生水表輪𢌞生死金魚為魚類之美貴者能得被度出離生死之衆生也左手於臍際執持滿貯甘露之人腦蓋骨碗此尊之頂上即為根本上師金剛大持佛尊藍色身著無上天衣妙寶莊嚴兩手交叉於胸左鈴右杵餘詳如上已述所有本尊上師各各皆有虹圓光已上頗哇心要轉識自在法完
